<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Default tails coin face">
  <defs>
    <radialGradient id="face" cx="35%" cy="26%" r="78%">
      <stop offset="0" stop-color="#252a34"/>
      <stop offset=".42" stop-color="#090c12"/>
      <stop offset=".82" stop-color="#020308"/>
      <stop offset="1" stop-color="#000104"/>
    </radialGradient>
    <linearGradient id="softLight" x1="92" x2="420" y1="70" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".12"/>
