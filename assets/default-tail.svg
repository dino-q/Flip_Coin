      <feDropShadow dx="3" dy="4" stdDeviation="1.6" flood-color="#000000" flood-opacity=".72"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#000104"/>
  <circle cx="256" cy="256" r="234" fill="url(#face)"/>
  <circle cx="256" cy="256" r="234" fill="url(#softLight)"/>

  <g fill="none" stroke-linecap="round" filter="url(#emboss)">
